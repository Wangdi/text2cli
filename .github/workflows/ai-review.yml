name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Analyze code changes
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const issues = [];

            for (const file of files) {
              if (file.filename.endsWith('.rs')) {
                // Check for .unwrap() usage
                if (file.patch && file.patch.includes('.unwrap()')) {
                  issues.push(`- **${file.filename}**: Contains \`.unwrap()\` - consider using \`.expect()\` with a message or proper error handling`);
                }
                
                // Check for unsafe blocks
                if (file.patch && file.patch.includes('unsafe')) {
                  issues.push(`- **${file.filename}**: Contains \`unsafe\` block - ensure safety comments are present`);
                }
              }
            }

            if (issues.length > 0) {
              const body = `## 🤖 Automated Code Review\n\n**Review Findings:**\n\n${issues.join('\n')}\n\n> These are automated suggestions. Please review and address as needed.`;
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
