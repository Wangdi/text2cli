name: Copilot Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  copilot-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup GitHub Copilot
        run: |
          echo "Note: This workflow requires GitHub Copilot subscription"
          echo "Copilot will automatically review your PR if enabled in repository settings"

      # Alternative: Use a custom AI review bot
      - name: AI Code Review
        if: github.event.pull_request.draft == false
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const reviewComments = [];

            for (const file of files) {
              if (file.filename.endsWith('.rs')) {
                // Basic Rust code review checks
                if (file.patch && file.patch.includes('unwrap()')) {
                  reviewComments.push({
                    path: file.filename,
                    body: '⚠️ Consider using `.expect()` with a message or proper error handling instead of `.unwrap()`'
                  });
                }
              }
            }

            if (reviewComments.length > 0) {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                body: '## 🤖 AI Code Review\n\nAutomated review suggestions:',
                event: 'COMMENT',
                comments: reviewComments
              });
            }
